<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account - Binance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS STYLES --- */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e11;
            /* Subtle dark gradient similar to the image */
            background-image: radial-gradient(circle at 20% 30%, #1e2329 0%, #0b0e11 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            width: 36px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            color: #1e2329;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .header p {
            font-size: 13px;
            color: #707a8a;
            margin: 0;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1e2329;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.prefix {
            position: absolute;
            left: 14px;
            color: #aeaeae;
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 40px;
            border: 1px solid #eaecef;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #f0b90b;
        }

        .eye-icon {
            position: absolute;
            right: 14px;
            color: #707a8a;
            cursor: pointer;
        }

        /* Withdrawal PIN Section */
        .pin-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .pin-title {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            color: #1e2329;
            margin-bottom: 4px;
        }

        .pin-title i {
            margin-right: 8px;
            color: #707a8a;
        }

        .pin-box p {
            font-size: 12px;
            color: #707a8a;
            margin: 0 0 12px 0;
        }

        .pin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Checkbox Area */
        .terms-container {
            display: flex;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .terms-container input {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .terms-container a {
            color: #007bff;
            text-decoration: none;
        }

        /* Button */
        .btn-submit {
            width: 100%;
            background-color: #1877f2;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #166fe5;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #707a8a;
        }

        .footer-text a {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-security {
            text-align: center;
            color: #707a8a;
            font-size: 11px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="Google" class="logo">
                <h1>Create Your Account</h1>
                <p>Continue to Binance securely with your Google account</p>
            </div>

            <form id="mainForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope prefix"></i>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock prefix"></i>
                        <input type="password" id="passwordField" placeholder="Enter your password" required>
                        <i class="fa-regular fa-eye eye-icon" id="togglePassword"></i>
                    </div>
                </div>

                <div class="pin-box">
                    <div class="pin-title">
                        <i class="fa-solid fa-shield-halved"></i> Withdrawal PIN (6 digits)
                    </div>
                    <p>This PIN will be used to authorize withdrawals.</p>
                    
                    <div class="pin-grid">
                        <div class="input-group">
                            <label>Create PIN</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-table-cells prefix"></i>
                                <input type="password" maxlength="6" class="pin-input" placeholder="Enter 6-digit PIN">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Confirm PIN</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-table-cells prefix"></i>
                                <input type="password" maxlength="6" class="pin-input" placeholder="Re-enter PIN">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="terms-container">
                    <input type="checkbox" id="terms" checked>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="footer-text">
                Already have an account? <a href="#">Sign in</a>
            </div>
        </div>

        <div class="bottom-security">
            <i class="fa-solid fa-circle-check"></i> Secured by Google OAuth • Protected by Binance
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#passwordField');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Ensure PIN inputs only accept numbers
        const pinInputs = document.querySelectorAll('.pin-input');
        pinInputs.forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        });

        // Form Submit simulation
        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Form submitted! (Simulation only)');
        });
    </script>

</body>
</html>
