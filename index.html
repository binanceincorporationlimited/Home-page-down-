<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Traders - Copy Trading</title>
    <style>
        :root {
            --bg-dark: #1e2329;
            --card-bg: #2b3139;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --green: #0ecb81;
            --gold: #f0b90b;
            --border-radius: 12px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        h2 { margin-left: 20px; font-weight: 600; }

        /* Scrollable Container */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding: 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-container::-webkit-scrollbar { height: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #474d57; border-radius: 10px; }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            min-width: 320px;
            padding: 20px;
            position: relative;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); background-color: #323942; }

        .badge {
            background-color: #363c46;
            color: var(--text-main);
            padding: 3px 12px;
            border-top-left-radius: var(--border-radius);
            border-bottom-right-radius: 10px;
            font-size: 11px;
            position: absolute;
            top: 0; left: 0;
        }

        .header { display: flex; align-items: center; margin-top: 15px; margin-bottom: 20px; }

        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
            border: 2px solid #474d57;
        }

        .user-info h3 { margin: 0; font-size: 16px; color: var(--text-main); }

        .user-stats { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .min-tag {
            background-color: rgba(240, 185, 11, 0.1);
            color: var(--gold);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 5px;
            font-weight: bold;
        }

        .pnl-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .pnl-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .pnl-value { font-size: 20px; font-weight: bold; color: var(--green); }
        .pnl-value span { font-size: 12px; font-weight: normal; margin-left: 2px; }

        .mini-chart { width: 70px; height: 25px; border-bottom: 2px solid var(--green); opacity: 0.5; }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            border-top: 1px solid #3b424d;
            padding-top: 15px;
        }

        .stat-item label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .stat-item span { font-size: 13px; font-weight: 500; }
        .positive { color: var(--green); }
    </style>
</head>
<body>

</body>
</html>
